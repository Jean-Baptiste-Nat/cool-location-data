name: Sync World Data and Assets

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix functions

      - name: Sync world countries and generated payloads
        run: |
          npm run sync:world
          npm run sync:assets
          npm run build

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/generated/world.generated.js public/location-data.json public/location-data.js public/location-data.min.js public/assets/flags public/assets/icons public/api/data-update-report.json
          git diff --staged --quiet || git commit -m "chore(sync): world data + assets"

      - name: Push
        run: git push
